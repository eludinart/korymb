server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Fallback SPA : toute route inconnue → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long sur les assets versionnés (nom avec hash Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache sur index.html (point d'entrée toujours frais)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
